name: Render Keep Alive

on:
  schedule:
    # JST 06:07〜23:57 = UTC 21:07〜14:57
    # 毎時0分付近を避ける
    - cron: "7,17,27,37,47,57 21-23 * * *"
    - cron: "7,17,27,37,47,57 0-14 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u

      - name: Ping Render app
        run: |
          curl --retry 3 --retry-delay 10 --max-time 30 -fsS https://cook-app-zfyj.onrender.com/ping
