name: Keep Render Alive

on:
  schedule:
    # JST 6:00〜23:50 = UTC 21:00〜14:50
    - cron: "*/10 21-23 * * *"
    - cron: "*/10 0-14 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: curl -fsS https://cook-app-zfyj.onrender.com/ping