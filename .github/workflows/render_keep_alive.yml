name: Render Keep Alive

on:
  schedule:
    # JST 6:00〜23:50 = UTC 21:00〜14:50
    # GitHub ActionsはUTC基準
    - cron: "7,17,27,37,47,57 21-23 * * *"
    - cron: "7,17,27,37,47,57 0-14 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/render_keep_alive.yml"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger
        run: |
          echo "event=${{ github.event_name }}"
          date -u

      - name: Ping Render app
        run: curl --retry 3 --retry-delay 10 --max-time 30 -fsS https://cook-app-zfyj.onrender.com/ping
